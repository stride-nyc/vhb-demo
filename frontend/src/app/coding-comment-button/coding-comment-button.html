<button class="comments-btn" [class.comments-btn--has-comment]="comment" (click)="openDialog()">Comments</button>

@if (dialogOpen) {
  <div class="comments-overlay" (click)="closeDialog()">
    <div class="comments-dialog" (click)="$event.stopPropagation()">
      <div class="comments-dialog-header">Coding Comment</div>
      <textarea
        class="comments-textarea"
        [(ngModel)]="draftComment"
        placeholder="Enter coding comment..."
      ></textarea>
      <div class="comments-dialog-actions">
        <button class="btn btn--secondary" (click)="closeDialog()">Cancel</button>
        <button class="btn btn--primary" (click)="saveComment()">Ok</button>
      </div>
    </div>
  </div>
}
