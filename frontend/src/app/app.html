<mat-toolbar color="primary">
  <span>VHB</span>
</mat-toolbar>

<mat-grid-list cols="2" rowHeight="fit" class="content-grid">
  <mat-grid-tile>
    <div class="info-panel">
      @if (collision()) {
        <app-collision-info [collision]="collision()" />
      }
      <router-outlet />
    </div>
  </mat-grid-tile>
  <mat-grid-tile>
    <app-map />
  </mat-grid-tile>
</mat-grid-list>
